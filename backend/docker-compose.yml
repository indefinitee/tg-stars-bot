version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: tg-stars-postgres
    environment:
      POSTGRES_USER: stars_user
      POSTGRES_PASSWORD: stars_pass
      POSTGRES_DB: stars_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stars_user -d stars_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
