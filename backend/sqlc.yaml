version: "2"
sql:
  - engine: "postgresql"
    queries: "db/queries.sql"
    schema: "migrations/001_initial.sql"
    gen:
      go:
        package: "db"
        out: "internal/infrastructure/db"
        sql_package: "database/sql"
        emit_json_tags: true
        emit_struct_setters: false
        emit_empty_slices: true
